name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Quality, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript quality gate
        run: bun run quality:ts

      - name: Test gate
        run: bun run test

      - name: Lean eval gate
        run: bun run eval:lean

      - name: SFE test gate
        run: bun run test:sfe

      - name: Build gate
        run: bun run build:sfe:single
