name: ums-memory

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api
    image: ums-memory-api:local
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      UMS_API_HOST: 0.0.0.0
      UMS_API_PORT: "8787"
      UMS_RUNTIME_STATE_FILE: /var/lib/ums/.ums-runtime-state
      UMS_STATE_LOCK_TIMEOUT_MS: "8000"
      UMS_STATE_LOCK_RETRY_MS: "25"
      UMS_API_AUTH_REQUIRED: "true"
      UMS_API_AUTH_TOKENS: ${UMS_API_AUTH_TOKENS:?UMS_API_AUTH_TOKENS must be set}
    ports:
      - "8787:8787"
    volumes:
      - ums_shared_state:/var/lib/ums
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "import { get } from 'node:http'; const req = get('http://127.0.0.1:8787/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker
    image: ums-memory-worker:local
    init: true
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      UMS_RUNTIME_STATE_FILE: /var/lib/ums/.ums-runtime-state
      UMS_WORKER_STATE_FILE: /var/lib/ums/.ums-runtime-state
      UMS_API_HOST: api
      UMS_API_PORT: "8787"
      UMS_API_HEALTH_PATH: /
      UMS_API_READY_TIMEOUT_MS: "90000"
      UMS_WORKER_INTERVAL_MS: "30000"
      UMS_WORKER_RESTART_LIMIT: "3"
      UMS_WORKER_RESTART_DELAY_MS: "250"
      UMS_WORKER_REPLAY_EVAL_MAX_PER_PROFILE: "5"
      UMS_WORKER_MAX_ERROR_ENTRIES: "25"
    command:
      - /bin/sh
      - -ec
      - |
        bun -e "import { get } from 'node:http'; const host = process.env.UMS_API_HOST ?? 'api'; const port = Number(process.env.UMS_API_PORT ?? 8787); const path = process.env.UMS_API_HEALTH_PATH ?? '/'; const timeoutMs = Number(process.env.UMS_API_READY_TIMEOUT_MS ?? 90000); const started = Date.now(); const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms)); const isReady = () => new Promise((resolve) => { const req = get({ host, port, path }, (res) => { res.resume(); resolve(res.statusCode === 200); }); req.on('error', () => resolve(false)); }); const main = async () => { for (;;) { if (await isReady()) { return; } if (Date.now() - started > timeoutMs) { console.error('worker startup timed out waiting for api readiness'); process.exit(1); } await sleep(1000); } }; await main();"
        exec bun apps/ums/src/index.ts worker
    volumes:
      - ums_shared_state:/var/lib/ums
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "import { accessSync, constants, readFileSync, readdirSync } from 'node:fs'; const hasWorkerProcess = readdirSync('/proc').filter((entry) => /^\\d+$/.test(entry)).some((pid) => { try { const cmdline = readFileSync(`/proc/${pid}/cmdline`, 'utf8'); return cmdline.includes('apps/ums/src/index.ts') && cmdline.includes('worker'); } catch { return false; } }); if (!hasWorkerProcess) { process.exit(1); } accessSync('/var/lib/ums', constants.R_OK | constants.W_OK);",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 100s

volumes:
  ums_shared_state:
    driver: local
